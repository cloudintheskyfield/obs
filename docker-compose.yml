version: '3.8'

services:
  omni-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omni-agent
    ports:
      - "8000:8000"  # Web API端口
    volumes:
      # 代码动态挂载 - 主要代码目录
      - ./src:/app/src:rw
      - ./config:/app/config:rw
      - ./scripts:/app/scripts:rw
      - ./.claude:/app/.claude:rw
      - ./frontend:/app/frontend:rw
      # 项目配置文件
      - ./pyproject.toml:/app/pyproject.toml:rw
      - ./uv.lock:/app/uv.lock:rw
      # 数据目录
      - ./workspace:/app/workspace:rw
      - ./logs:/app/logs:rw
      - ./screenshots:/app/screenshots:rw
      # Docker socket for terminal operations
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # VLLM配置
      - VLLM_BASE_URL=http://223.109.239.14:10002/v1/chat/completions
      - VLLM_API_KEY=dummy_key
      - VLLM_MODEL=multimodal_model
      
      # Claude API配置
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      
      # 工作目录
      - WORK_DIR=/app/workspace
      
      # 安全配置
      - ALLOW_FILE_OPS=true
      - ALLOW_TERMINAL=true
      
      # 日志配置
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/omni_agent.log
      
      # 网页浏览配置
      - WEB_HEADLESS=false
      - WEB_TIMEOUT=30
      - SCREENSHOT_DIR=/app/screenshots
      
      # Docker环境标识
      - RUNNING_IN_DOCKER=true
      
      # Skills配置
      - ENABLE_COMPUTER_USE=true
      - ENABLE_TEXT_EDITOR=true
      - ENABLE_BASH=true
      - SKILLS_DIR=/app/.claude/skills
      
    privileged: true  # 需要权限访问浏览器和文件系统
    networks:
      - omni-network
    restart: unless-stopped
    command: ["uv", "run", "uvicorn", "omni_agent.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/src", "--reload-dir", "/app/.claude", "--reload-dir", "/app/frontend", "--reload-delay", "0.1"]

  # 可选：添加Redis用于任务队列
  redis:
    image: redis:7-alpine
    container_name: omni-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - omni-network
    restart: unless-stopped

  # 可选：添加PostgreSQL用于数据持久化
  postgres:
    image: postgres:15-alpine
    container_name: omni-postgres
    environment:
      - POSTGRES_DB=omni_agent
      - POSTGRES_USER=omni_user
      - POSTGRES_PASSWORD=omni_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - omni-network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  omni-network:
    driver: bridge