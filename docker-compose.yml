
services:
  omni-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obs-omni-agent
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:rw
      - ./config:/app/config:rw
      - ./scripts:/app/scripts:rw
      - ./.claude:/app/.claude:rw
      - ./skills:/app/skills:rw
      - ./frontend:/app/frontend:rw
      - ./pyproject.toml:/app/pyproject.toml:rw
      - ./uv.lock:/app/uv.lock:rw
      - ./workspace:/app/workspace:rw
      - ./logs:/app/logs:rw
      - ./screenshots:/app/screenshots:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - VLLM_BASE_URL=${VLLM_BASE_URL:-https://api.minimaxi.com/v1/chat/completions}
      - VLLM_API_KEY=${VLLM_API_KEY:-dummy_key}
      - VLLM_MODEL=${VLLM_MODEL:-MiniMax-M2}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - WORK_DIR=/app/workspace
      - ALLOW_FILE_OPS=true
      - ALLOW_TERMINAL=true
      - LOG_LEVEL=INFO
      - LOG_FILE=${LOG_FILE:-/app/logs/omni_agent.log}
      - WEB_HEADLESS=false
      - WEB_TIMEOUT=30
      - SCREENSHOT_DIR=/app/screenshots
      - RUNNING_IN_DOCKER=true
      - ENABLE_COMPUTER_USE=true
      - ENABLE_TEXT_EDITOR=true
      - ENABLE_BASH=true
      - SKILLS_DIR=${SKILLS_DIR:-/app/.claude/skills}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    privileged: true
    networks:
      - omni-network
    restart: unless-stopped
    command: ["uv", "run", "uvicorn", "omni_agent.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/src", "--reload-dir", "/app/.claude", "--reload-dir", "/app/frontend", "--reload-delay", "0.1"]

  redis:
    image: redis:7-alpine
    container_name: obs-redis
    profiles: ["infra"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - omni-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: obs-postgres
    profiles: ["infra"]
    environment:
      - POSTGRES_DB=omni_agent
      - POSTGRES_USER=omni_user
      - POSTGRES_PASSWORD=omni_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - omni-network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  omni-network:
    driver: bridge
