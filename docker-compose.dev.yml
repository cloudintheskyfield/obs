services:
  omni-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obs-omni-agent-dev
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:rw,cached
      - ./config:/app/config:rw,cached
      - ./scripts:/app/scripts:rw,cached
      - ./.claude:/app/.claude:rw,cached
      - ./skills:/app/skills:rw,cached
      - ./frontend:/app/frontend:rw,cached
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
      - ./workspace:/app/workspace:rw
      - ./logs:/app/logs:rw
      - ./screenshots:/app/screenshots:rw
      - ${HOME}:/host-home:rw
    environment:
      - VLLM_BASE_URL=${VLLM_BASE_URL:-https://api.minimaxi.com/v1/chat/completions}
      - VLLM_API_KEY=${VLLM_API_KEY:-dummy_key}
      - VLLM_MODEL=${VLLM_MODEL:-MiniMax-M2}
      - WORK_DIR=${WORK_DIR:-/app/workspace}
      - LOG_LEVEL=DEBUG
      - RUNNING_IN_DOCKER=true
      - HOST_HOME=${HOME}
      - HOST_HOME_MOUNT=/host-home
      - HOST_REPO_ROOT=${PWD}
      - ENABLE_COMPUTER_USE=true
      - ENABLE_TEXT_EDITOR=true
      - ENABLE_BASH=true
      - SKILLS_DIR=${SKILLS_DIR:-/app/.claude/skills}
      - DEV_MODE=true
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - omni-network
    restart: unless-stopped
    command: [
      "uv", "run", "uvicorn", "omni_agent.api:app", 
      "--host", "0.0.0.0", 
      "--port", "8000", 
      "--reload",
      "--reload-dir", "/app/src",
      "--reload-dir", "/app/.claude", 
      "--reload-dir", "/app/frontend",
      "--reload-delay", "0.05",
      "--log-level", "info",
      "--access-log"
    ]
    security_opt:
      - seccomp:unconfined
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

networks:
  omni-network:
    driver: bridge
